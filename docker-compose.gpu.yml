# 데스크탑 GPU 렌더링 전용 (독립 실행)
# 네트워크 드라이브(Z:)에서 개별 파일 마운트가 안 되므로
# 디렉토리 전체를 /app에 마운트
#
# 사용법:
#   docker compose -f docker-compose.gpu.yml run --rm topik-bot \
#     python3 make_video.py --db /app/data/LanguageTest/words_db.json --id 1 --output /app/output/

services:
  topik-bot:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp_service_account.json
      - TZ=Asia/Seoul
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
    volumes:
      - .:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
